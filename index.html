<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تحويل WebP إلى JPG | WebBag</title>

<meta name="description" content="حوّل صور WebP إلى JPG مجانًا أونلاين بسرعة وجودة عالية.">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="card">

<h1>تحويل WebP إلى JPG</h1>

<p class="subtitle">
ارفع صورة WebP وحولها إلى JPG خلال ثوانٍ.
</p>

<input
type="file"
id="imageInput"
accept=".webp,image/webp"

>

<div id="preview"></div>

<div class="info">

<p>
اسم الملف:
<strong id="fileName"></strong>
</p>

<p>
الحجم:
<strong id="fileSize"></strong>
</p>

</div>

<div class="buttons">

<button id="convertBtn">
تحويل إلى JPG
</button>

<a id="downloadBtn">
تنزيل JPG
</a>

</div>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
